name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore ${{ github.workspace }}/app/keystore.jks \
            -alias snake \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Snake Game, OU=Dev, O=Dev, L=City, S=State, C=US"

      - name: Build release AAB
        run: gradle :app:bundleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/keystore.jks
          KEYSTORE_PASSWORD: android123
          KEY_ALIAS: snake
          KEY_PASSWORD: android123

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: snake-release
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/keystore.jks
