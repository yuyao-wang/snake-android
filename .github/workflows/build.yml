name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: snake-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Validate release signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 is not configured"
            exit 1
          fi

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/app/upload-keystore.jks"

      - name: Build release AAB
        run: ./gradlew :app:bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'snake' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android123' }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: snake-release
          path: app/build/outputs/bundle/release/app-release.aab
